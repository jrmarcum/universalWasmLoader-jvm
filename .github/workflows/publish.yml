# Publish to Maven Central (Sonatype Central Portal) on a v* tag.
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ run:-ONLY WORKFLOW — DO NOT REINTRODUCE `uses:` STEPS.                       │
# │                                                                             │
# │ This org's Actions policy permits ONLY actions owned by `jrmarcum`. Any     │
# │ third-party `uses:` step (actions/checkout, actions/setup-java,             │
# │ gradle/gradle-build-action, …) triggers a `startup_failure`: the workflow   │
# │ never runs a single step, so nothing reaches Maven Central. Every step here │
# │ MUST therefore be a plain `run:` step — checkout via `git clone`, install   │
# │ the JDK via `run:`, and use the committed Gradle wrapper (`./gradlew`).      │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   MAVEN_CENTRAL_USERNAME   Central Portal user token name   (→ ORG_GRADLE_PROJECT_mavenCentralUsername)
#   MAVEN_CENTRAL_PASSWORD   Central Portal user token secret (→ ORG_GRADLE_PROJECT_mavenCentralPassword)
#   GPG_PRIVATE_KEY          ASCII-armored GPG private key    (→ ORG_GRADLE_PROJECT_signingInMemoryKey)
#   GPG_PASSPHRASE           passphrase for that GPG key      (→ ORG_GRADLE_PROJECT_signingInMemoryKeyPassword)
#
# The com.vanniktech.maven.publish plugin reads the ORG_GRADLE_PROJECT_* names
# directly (in-memory signing + Central Portal upload); no settings.xml or
# secring.gpg file is needed.

name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Test and Publish to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- Checkout (run:, not actions/checkout) -------------------------------
      - name: Clone repository at tag
        run: |
          git clone --depth=1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .

      # --- JDK install (run:, not actions/setup-java) --------------------------
      # The build targets JVM 24 with a JDK 25 toolchain (requires JDK 24+).
      # ubuntu-latest preinstalls several Temurin JDKs under /usr/lib/jvm; pick a
      # 24+ one if present, otherwise download Temurin 25 via `run:`.
      - name: Set up JDK 24+ (Temurin)
        run: |
          set -euo pipefail
          # Prefer an already-installed Temurin 24/25 to avoid a network download.
          found=""
          for d in /usr/lib/jvm/temurin-25* /usr/lib/jvm/temurin-24* \
                   /usr/lib/jvm/*-25-* /usr/lib/jvm/*-24-*; do
            if [ -x "$d/bin/javac" ]; then found="$d"; break; fi
          done
          if [ -z "$found" ]; then
            echo "No preinstalled JDK 24+ found — downloading Temurin 25."
            url="https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse"
            mkdir -p "$HOME/jdk"
            curl -fsSL "$url" -o /tmp/jdk.tar.gz
            tar -xzf /tmp/jdk.tar.gz -C "$HOME/jdk" --strip-components=1
            found="$HOME/jdk"
          fi
          echo "Using JAVA_HOME=$found"
          echo "JAVA_HOME=$found"      >> "$GITHUB_ENV"
          echo "$found/bin"            >> "$GITHUB_PATH"

      - name: Show toolchain
        run: |
          java -version
          ./gradlew --version

      # --- Test gate -----------------------------------------------------------
      - name: Test
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon test

      # --- Publish (signed) to Maven Central -----------------------------------
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew --no-daemon publishAllPublicationsToMavenCentralRepository

      # --- Release bookkeeping (run:, gh is preinstalled on the runner) --------
      - name: Create release branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/${GITHUB_REF_NAME}"
          git push origin "release/${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --target "release/${GITHUB_REF_NAME}" \
            --generate-notes
